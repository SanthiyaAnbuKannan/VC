<!DOCTYPE html>
<html>
<head>

    <title>Creative Portfolio</title>

    <style>

        /* CSS Variables */

        :root{
            --main-color:#222;
            --second-color:#f4f4f4;
            --accent-color:teal;
            --text-color:white;
        }

        /* Smooth Scrolling */

        html{
            scroll-behavior:smooth;
        }

        body{
            margin:0;
            font-family:Arial;
            background:var(--second-color);
        }

        /* Navigation */

        nav{
            background:var(--main-color);
            padding:15px;
            text-align:center;
        }

        nav a{
            color:var(--text-color);
            text-decoration:none;
            margin:15px;
        }

        /* Split Screen Hero Section */

        .hero{
            display:flex;
            height:100vh;
        }

        .left{
            flex:1;
            background:var(--accent-color);
            color:white;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .right{
            flex:1;
            background:url('https://via.placeholder.com/600') center/cover;
        }

        /* Section */

        section{
            padding:40px;
            text-align:center;
        }

        /* Project Cards Flip Effect */

        .projects{
            display:flex;
            justify-content:center;
            gap:20px;
        }

        .card{
            width:200px;
            height:200px;
            perspective:1000px;
        }

        .card-inner{
            width:100%;
            height:100%;
            position:relative;
            transition:1s;
            transform-style:preserve-3d;
        }

        .card:hover .card-inner{
            transform:rotateY(180deg);
        }

        .front,
        .back{
            position:absolute;
            width:100%;
            height:100%;
            backface-visibility:hidden;

            display:flex;
            justify-content:center;
            align-items:center;

            border:1px solid gray;
        }

        .front{
            background:white;
        }

        .back{
            background:var(--accent-color);
            color:white;
            transform:rotateY(180deg);
        }

        /* Skills Section */

        .skill{
            margin:20px auto;
            width:60%;
            text-align:left;
        }

        .bar{
            background:lightgray;
            height:20px;
        }

        .progress{
            background:var(--accent-color);
            height:20px;
        }

        /* ===== UPDATED TESTIMONIAL CAROUSEL (FIXED) ===== */

        .testimonial{
            width:300px;
            margin:auto;
            overflow:hidden;
            border:1px solid gray;
            padding:20px;
        }

        .slider-track{
            display:flex;
            width:300%;
            animation:slide 9s infinite;
        }

        .slide{
            width:300px;
            flex-shrink:0;
            text-align:center;
        }

        @keyframes slide{
            0%{
                transform:translateX(0);
            }
            33%{
                transform:translateX(-300px);
            }
            66%{
                transform:translateX(-600px);
            }
            100%{
                transform:translateX(0);
            }
        }

        /* Contact Form */

        form{
            width:300px;
            margin:auto;
        }

        input,
        textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:2px solid gray;
        }

        /* CSS Validation Feedback */

        input:valid,
        textarea:valid{
            border-color:green;
        }

        input:invalid,
        textarea:invalid{
            border-color:red;
        }

        button{
            padding:10px 20px;
            background:var(--accent-color);
            color:white;
            border:none;
        }

    </style>

</head>

<body>

<!-- Navigation -->

<nav>

    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>

</nav>

<!-- Hero Section -->

<div class="hero" id="home">

    <div class="left">
        <h1>Creative Designer</h1>
    </div>

    <div class="right"></div>

</div>

<!-- Projects -->

<section id="projects">

    <h2>Projects</h2>

    <div class="projects">

        <div class="card">
            <div class="card-inner">
                <div class="front">Project 1</div>
                <div class="back">Website Design</div>
            </div>
        </div>

        <div class="card">
            <div class="card-inner">
                <div class="front">Project 2</div>
                <div class="back">Logo Design</div>
            </div>
        </div>

    </div>

</section>

<!-- Skills -->

<section id="skills">

    <h2>Skills</h2>

    <div class="skill">
        HTML
        <div class="bar">
            <div class="progress" style="width:90%;"></div>
        </div>
    </div>

    <div class="skill">
        CSS
        <div class="bar">
            <div class="progress" style="width:80%;"></div>
        </div>
    </div>

</section>

<!-- Testimonial (FIXED CAROUSEL) -->

<section>

    <h2>Testimonials</h2>

    <div class="testimonial">

        <div class="slider-track">

            <div class="slide">
                <p>"Amazing Work!"</p>
                <p>- Client A</p>
            </div>

            <div class="slide">
                <p>"Very Creative Designer!"</p>
                <p>- Client B</p>
            </div>

            <div class="slide">
                <p>"Highly Recommended!"</p>
                <p>- Client C</p>
            </div>

        </div>

    </div>

</section>

<!-- Contact -->

<section id="contact">

    <h2>Contact</h2>

    <form>

        <input type="text" placeholder="Enter Name" required>

        <input type="email" placeholder="Enter Email" required>

        <textarea placeholder="Message" required></textarea>

        <button>Send</button>

    </form>

</section>

</body>
</html>
